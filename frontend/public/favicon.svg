<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="0.55" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#7c6bc4"/>
    </linearGradient>
    <linearGradient id="core" x1="13" y1="13" x2="19" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4f1f9"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(10 8) rotate(48) scale(18)">
      <stop stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>

  <!-- Molecular ring + knowledge-graph bonds -->
  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M16 7.5 L21.2 10.5 L21.2 16.5 L16 19.5 L10.8 16.5 L10.8 10.5 Z" stroke-width="1.35" fill="none"/>
    <path d="M16 7.5 L16 19.5 M10.8 10.5 L21.2 16.5 M21.2 10.5 L10.8 16.5" stroke-width="0.85" opacity="0.55"/>
    <path d="M16 7.5 L16 4.5 M21.2 10.5 L24 9 M21.2 16.5 L24 23 M16 19.5 L16 27.5 M10.8 16.5 L5 23 M10.8 10.5 L5 9" stroke-width="1" opacity="0.78"/>
  </g>

  <!-- Graph nodes -->
  <circle cx="16" cy="4.5" r="1.35" fill="#ffffff"/>
  <circle cx="24" cy="9" r="1.2" fill="#e0f2fe"/>
  <circle cx="24" cy="23" r="1.2" fill="#e0f2fe"/>
  <circle cx="16" cy="27.5" r="1.35" fill="#ffffff"/>
  <circle cx="5" cy="23" r="1.2" fill="#ede9fe"/>
  <circle cx="5" cy="9" r="1.2" fill="#ede9fe"/>
  <circle cx="16" cy="7.5" r="1.15" fill="#ffffff"/>
  <circle cx="21.2" cy="10.5" r="1.05" fill="#f0fdfa"/>
  <circle cx="21.2" cy="16.5" r="1.05" fill="#f0fdfa"/>
  <circle cx="16" cy="19.5" r="1.15" fill="#ffffff"/>
  <circle cx="10.8" cy="16.5" r="1.05" fill="#f0fdfa"/>
  <circle cx="10.8" cy="10.5" r="1.05" fill="#f0fdfa"/>

  <!-- AI / discovery core -->
  <circle cx="16" cy="13.5" r="3.1" fill="url(#core)" filter="url(#glow)"/>
  <path d="M16 11.4 L16.9 13.1 L18.8 13.35 L17.4 14.55 L17.8 16.4 L16 15.35 L14.2 16.4 L14.6 14.55 L13.2 13.35 L15.1 13.1 Z" fill="#0891b2"/>
</svg>
