version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scinova
      POSTGRES_PASSWORD: scinova
      POSTGRES_DB: scinova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scinova"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/scinova12
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://scinova:scinova@postgres:5432/scinova
      SQLITE_FALLBACK: "false"
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scinova12
      NEO4J_ENABLED: "true"
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_USE_HTTP: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      QUOTA_MAX_UPLOADS: "2"
      QUOTA_MAX_WORKFLOWS: "2"
      SECRET_KEY: ${SECRET_KEY:-scinova-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info -Q celery
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://scinova:scinova@postgres:5432/scinova
      SQLITE_FALLBACK: "false"
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scinova12
      NEO4J_ENABLED: "true"
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CHROMA_USE_HTTP: "true"
      SECRET_KEY: ${SECRET_KEY:-scinova-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_ALLOW_ALL_HOSTS: ${VITE_ALLOW_ALL_HOSTS:-true}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
