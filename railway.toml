[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"

# Railway: provision Postgres, Redis, and Neo4j as separate services.
# Set env vars in the Railway dashboard:
#   DATABASE_URL          — from Railway Postgres plugin
#   REDIS_URL             — from Railway Redis plugin
#   SECRET_KEY            — strong random string
#   NEO4J_URI/USER/PASSWORD — Neo4j plugin or external instance
#   CORS_ORIGINS          — your frontend URL
#   OPENAI_API_KEY, MISTRAL_API_KEY
#   SQLITE_FALLBACK=false
#   USE_CELERY=true
#
# Deploy a second service for the Celery worker:
#   startCommand = "celery -A app.celery_app worker --loglevel=info"
#
# Note: Railway offers limited free trial credits, not unlimited free hosting.
